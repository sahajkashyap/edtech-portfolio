<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplication Game Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body style="margin: 0; padding: 1.5rem; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent;">

<style>
  :root {
    --color-text-primary: #2c3e50;
    --color-text-secondary: #7f8c8d;
    --color-background-primary: #FBF9F7;
    --color-background-secondary: #F3EFE7;
    --color-border-primary: #378ADD;
    --color-border-secondary: #D4C5B9;
    --color-border-tertiary: #E8DDD4;
    --blue: #378ADD;
    --orange: #BA7517;
    --green: #639922;
  }

  * { box-sizing: border-box; }
  body { margin: 0; padding: 1.5rem; background: #E8D4C4; }
  .container { max-width: 1400px; margin: 0 auto; }

  .header { margin-bottom: 2rem; }
  .header h1 { margin: 0; font-size: 24px; font-weight: 600; color: var(--color-text-primary); }
  .header p { margin: 6px 0 0 0; font-size: 14px; color: var(--color-text-secondary); }

  .layout { display: grid; grid-template-columns: 360px 1fr; gap: 2rem; align-items: start; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  .box { padding: 1.5rem; background: var(--color-background-secondary); border-radius: 12px; border: 0.5px solid var(--color-border-tertiary); margin-bottom: 1.5rem; }
  .box-title { font-size: 15px; font-weight: 700; color: var(--color-text-secondary); margin: 0 0 1rem 0; text-transform: uppercase; letter-spacing: 0.5px; }

  label { display: block; font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 6px; }

  select, input[type="number"], input[type="text"] {
    width: 100%; padding: 12px 14px; border: 1px solid var(--color-border-secondary);
    border-radius: 8px; font-size: 16px; font-weight: 500; background: var(--color-background-primary);
    color: var(--color-text-primary); margin-bottom: 1rem; cursor: pointer;
  }
  select:focus, input:focus { outline: none; border-color: var(--blue); }

  .tables-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 0.5rem; }
  .table-chip {
    padding: 10px 0; text-align: center; border-radius: 8px; font-size: 15px; font-weight: 600;
    border: 1px solid var(--color-border-secondary); background: var(--color-background-primary);
    color: var(--color-text-primary); cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .table-chip:hover { border-color: var(--blue); }
  .table-chip.selected { background: var(--blue); border-color: var(--blue); color: white; }

  .chip-actions { display: flex; gap: 8px; margin-bottom: 1rem; }
  .chip-actions button { flex: 1; font-size: 12px; padding: 8px; }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
  .toggle-row label { margin: 0; cursor: pointer; }
  .toggle-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--blue); margin: 0; }

  button { padding: 10px 16px; font-size: 14px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); border-radius: 6px; cursor: pointer; transition: 0.2s; }
  button:hover { background: var(--color-background-secondary); }
  .btn-primary { background: var(--blue); border-color: var(--blue); color: white; font-weight: 500; }
  .btn-primary:hover { background: #2966bb; }

  .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Preview area */
  .preview-box { background: var(--color-background-secondary); border-radius: 12px; border: 0.5px solid var(--color-border-tertiary); padding: 1.5rem; }
  .preview-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .sheet {
    background: white; border-radius: 8px; padding: 32px; border: 0.5px solid var(--color-border-tertiary);
    min-height: 400px; color: #1a1a1a;
  }
  .sheet-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid var(--blue); padding-bottom: 12px; margin-bottom: 20px; }
  .sheet-title { font-size: 20px; font-weight: 700; color: var(--color-text-primary); margin: 0; }
  .sheet-meta { font-size: 12px; color: var(--color-text-secondary); }
  .name-line { font-size: 13px; color: var(--color-text-secondary); }

  /* Worksheet */
  .problem-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px 28px; }
  .problem { font-size: 17px; font-weight: 500; display: flex; align-items: baseline; gap: 8px; }
  .problem .num { color: var(--color-text-secondary); font-size: 12px; width: 22px; }
  .problem .ans { border-bottom: 1px solid #bbb; min-width: 46px; display: inline-block; text-align: center; color: var(--green); font-weight: 700; }

  /* Flashcards */
  .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .flashcard { border: 1.5px dashed #bbb; border-radius: 10px; padding: 24px 12px; text-align: center; }
  .flashcard .fc-q { font-size: 24px; font-weight: 700; color: var(--color-text-primary); }
  .flashcard .fc-a { font-size: 14px; color: var(--green); font-weight: 700; margin-top: 8px; }

  /* Bingo */
  .bingo-card { border: 2px solid var(--blue); border-radius: 10px; overflow: hidden; max-width: 420px; margin: 0 auto; }
  .bingo-title { background: var(--blue); color: white; text-align: center; font-weight: 700; letter-spacing: 4px; padding: 8px; font-size: 18px; }
  .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); }
  .bingo-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
  .bingo-cell.free { background: var(--color-background-secondary); font-size: 11px; text-transform: uppercase; color: var(--color-text-secondary); }
  .caller-list { margin-top: 20px; font-size: 12px; color: var(--color-text-secondary); }
  .caller-list b { color: var(--color-text-primary); }

  /* Matching */
  .match-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
  .match-col-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--color-text-secondary); font-weight: 700; margin-bottom: 12px; }
  .match-item { padding: 10px 14px; border: 1px solid var(--color-border-tertiary); border-radius: 8px; margin-bottom: 10px; font-size: 16px; font-weight: 500; display: flex; justify-content: space-between; }
  .match-item .dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--blue); }

  .empty-hint { color: var(--color-text-secondary); text-align: center; padding: 60px 20px; font-size: 14px; }
  .answer-badge { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--orange); background: rgba(186,117,23,0.1); padding: 3px 8px; border-radius: 6px; margin-left: 8px; }
</style>

<div class="container">

  <div class="header">
    <h1>Multiplication Game Generator</h1>
    <p>Build printable multiplication practice — worksheets, flashcards, bingo, and matching games. Pick your facts, generate, and export.</p>
  </div>

  <div class="layout">

    <!-- CONTROLS -->
    <div>
      <div class="box">
        <div class="box-title">Times Tables</div>
        <div class="tables-grid" id="tablesGrid"></div>
        <div class="chip-actions">
          <button onclick="selectAllTables(true)">Select all</button>
          <button onclick="selectAllTables(false)">Clear</button>
        </div>
      </div>

      <div class="box">
        <div class="box-title">Game Type</div>
        <select id="gameType" onchange="generate()">
          <option value="worksheet">Worksheet</option>
          <option value="flashcards">Flashcards (cut &amp; fold)</option>
          <option value="bingo">Bingo Card</option>
          <option value="matching">Matching Game</option>
        </select>

        <label for="titleInput">Sheet Title</label>
        <input type="text" id="titleInput" value="Multiplication Practice" oninput="generate()">

        <label for="countInput" id="countLabel">Number of Problems</label>
        <input type="number" id="countInput" value="15" min="1" max="60" oninput="generate()">

        <div class="toggle-row">
          <label for="answersToggle">Show answer key</label>
          <input type="checkbox" id="answersToggle" onchange="generate()">
        </div>
      </div>

      <div class="box">
        <div class="box-title">Actions</div>
        <div class="actions">
          <button class="btn-primary" onclick="generate()">Regenerate</button>
          <button onclick="exportPDF()">Export PDF</button>
          <button onclick="window.print()">Print</button>
        </div>
      </div>
    </div>

    <!-- PREVIEW -->
    <div class="preview-box">
      <div class="preview-toolbar">
        <div class="box-title" style="margin:0;">Preview</div>
        <div id="answerIndicator"></div>
      </div>
      <div class="sheet" id="sheet">
        <div class="empty-hint">Select at least one times table to generate a game.</div>
      </div>
    </div>

  </div>
</div>

<script>
const selectedTables = new Set([2, 3, 4, 5]);
let currentProblems = [];

function initTables() {
  const grid = document.getElementById('tablesGrid');
  for (let n = 1; n <= 12; n++) {
    const chip = document.createElement('div');
    chip.className = 'table-chip' + (selectedTables.has(n) ? ' selected' : '');
    chip.textContent = n;
    chip.onclick = () => toggleTable(n, chip);
    grid.appendChild(chip);
  }
}

function toggleTable(n, chip) {
  if (selectedTables.has(n)) { selectedTables.delete(n); chip.classList.remove('selected'); }
  else { selectedTables.add(n); chip.classList.add('selected'); }
  generate();
}

function selectAllTables(all) {
  selectedTables.clear();
  document.querySelectorAll('.table-chip').forEach((chip, i) => {
    const n = i + 1;
    if (all) { selectedTables.add(n); chip.classList.add('selected'); }
    else { chip.classList.remove('selected'); }
  });
  generate();
}

// Deterministic-per-generation shuffle using an incrementing seed so
// "Regenerate" produces a fresh set without relying on Math.random alone.
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildProblemPool() {
  const pool = [];
  selectedTables.forEach(t => {
    for (let f = 1; f <= 12; f++) {
      pool.push({ a: t, b: f, product: t * f });
    }
  });
  return pool;
}

function pickProblems(count) {
  const pool = buildProblemPool();
  if (pool.length === 0) return [];
  const shuffled = shuffle(pool);
  const picked = [];
  // Draw without repeats until we run out, then allow repeats to reach count.
  let i = 0;
  while (picked.length < count) {
    picked.push(shuffled[i % shuffled.length]);
    i++;
    if (i > count * 4 && picked.length >= pool.length) break;
  }
  return picked.slice(0, count);
}

function generate() {
  const sheet = document.getElementById('sheet');
  const type = document.getElementById('gameType').value;
  const showAnswers = document.getElementById('answersToggle').checked;
  const title = document.getElementById('titleInput').value || 'Multiplication Practice';

  document.getElementById('countLabel').textContent =
    type === 'bingo' ? 'Grid uses 24 products' : 'Number of Problems';
  document.getElementById('countInput').disabled = (type === 'bingo');

  document.getElementById('answerIndicator').innerHTML =
    showAnswers ? '<span class="answer-badge">Answer key shown</span>' : '';

  if (selectedTables.size === 0) {
    sheet.innerHTML = '<div class="empty-hint">Select at least one times table to generate a game.</div>';
    currentProblems = [];
    return;
  }

  let count = parseInt(document.getElementById('countInput').value) || 15;
  count = Math.max(1, Math.min(60, count));

  const headerHTML = `
    <div class="sheet-header">
      <div>
        <p class="sheet-title">${escapeHtml(title)}</p>
        <span class="sheet-meta">Times tables: ${[...selectedTables].sort((a,b)=>a-b).join(', ')}</span>
      </div>
      <div class="name-line">Name: _______________  Date: _________</div>
    </div>`;

  if (type === 'worksheet') {
    currentProblems = pickProblems(count);
    sheet.innerHTML = headerHTML + renderWorksheet(currentProblems, showAnswers);
  } else if (type === 'flashcards') {
    currentProblems = pickProblems(count);
    sheet.innerHTML = headerHTML + renderFlashcards(currentProblems, showAnswers);
  } else if (type === 'bingo') {
    currentProblems = pickProblems(30); // pool for caller list
    sheet.innerHTML = headerHTML + renderBingo(showAnswers);
  } else if (type === 'matching') {
    currentProblems = pickProblems(Math.min(count, 10));
    sheet.innerHTML = headerHTML + renderMatching(currentProblems, showAnswers);
  }
}

function renderWorksheet(problems, showAnswers) {
  const items = problems.map((p, i) => `
    <div class="problem">
      <span class="num">${i + 1}.</span>
      <span>${p.a} × ${p.b} =</span>
      <span class="ans">${showAnswers ? p.product : ''}</span>
    </div>`).join('');
  return `<div class="problem-grid">${items}</div>`;
}

function renderFlashcards(problems, showAnswers) {
  const cards = problems.map(p => `
    <div class="flashcard">
      <div class="fc-q">${p.a} × ${p.b}</div>
      <div class="fc-a">${showAnswers ? '= ' + p.product : '&nbsp;'}</div>
    </div>`).join('');
  return `<div class="cards-grid">${cards}</div>`;
}

function renderBingo(showAnswers) {
  // Collect unique products from selected tables for the grid.
  const products = new Set();
  selectedTables.forEach(t => { for (let f = 1; f <= 12; f++) products.add(t * f); });
  let pool = shuffle([...products]);

  // Need 24 cells (center is FREE). If fewer uniques, allow repeats.
  while (pool.length < 24) pool = pool.concat(pool);
  const cells = pool.slice(0, 24);

  let idx = 0;
  let gridHTML = '';
  for (let i = 0; i < 25; i++) {
    if (i === 12) {
      gridHTML += '<div class="bingo-cell free">Free</div>';
    } else {
      gridHTML += `<div class="bingo-cell">${cells[idx++]}</div>`;
    }
  }

  // Caller list: the multiplication facts that map to the products on the card.
  const callerFacts = [];
  const seen = new Set();
  selectedTables.forEach(t => {
    for (let f = 1; f <= 12; f++) {
      const prod = t * f;
      if (cells.includes(prod) && !seen.has(t + 'x' + f)) {
        seen.add(t + 'x' + f);
        callerFacts.push(`${t}×${f}=${prod}`);
      }
    }
  });

  const caller = showAnswers
    ? `<div class="caller-list"><b>Caller list:</b> ${shuffle(callerFacts).slice(0, 24).join(' &nbsp;·&nbsp; ')}</div>`
    : `<div class="caller-list">Mark a product when its fact is called. First to five in a row wins!</div>`;

  return `<div class="bingo-card">
      <div class="bingo-title">BINGO</div>
      <div class="bingo-grid">${gridHTML}</div>
    </div>${caller}`;
}

function renderMatching(problems, showAnswers) {
  const left = problems.map((p, i) => `
    <div class="match-item"><span>${p.a} × ${p.b}</span><span class="dot"></span></div>`).join('');
  const answers = showAnswers ? problems : shuffle(problems);
  const right = answers.map(p => `
    <div class="match-item"><span class="dot"></span><span>${p.product}</span></div>`).join('');
  return `<div class="match-wrap">
      <div><div class="match-col-title">Problem</div>${left}</div>
      <div><div class="match-col-title">Answer</div>${right}</div>
    </div>`;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function exportPDF() {
  try {
    if (selectedTables.size === 0) { alert('Select at least one times table first.'); return; }
    const { jsPDF } = window.jspdf;
    if (!jsPDF) throw new Error('jsPDF not loaded');

    const type = document.getElementById('gameType').value;
    const showAnswers = document.getElementById('answersToggle').checked;
    const title = document.getElementById('titleInput').value || 'Multiplication Practice';

    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const margin = 18;
    let y = margin;

    const C = { title: [44,62,80], blue: [55,138,221], orange: [186,117,23], green: [99,153,34], light: [127,140,141] };

    pdf.setFontSize(18);
    pdf.setTextColor(...C.title);
    pdf.text(title, margin, y);
    y += 7;

    pdf.setFontSize(10);
    pdf.setTextColor(...C.light);
    pdf.text(`Times tables: ${[...selectedTables].sort((a,b)=>a-b).join(', ')}`, margin, y);
    pdf.text('Name: ______________   Date: _________', pageWidth - margin, y, { align: 'right' });
    y += 4;
    pdf.setDrawColor(...C.blue);
    pdf.setLineWidth(0.6);
    pdf.line(margin, y, pageWidth - margin, y);
    y += 10;

    const ensureSpace = (needed) => {
      if (y + needed > pageHeight - margin) { pdf.addPage(); y = margin; }
    };

    if (type === 'worksheet' || type === 'flashcards') {
      const cols = 3;
      const colW = (pageWidth - margin * 2) / cols;
      const rowH = 12;
      currentProblems.forEach((p, i) => {
        const col = i % cols;
        if (col === 0) ensureSpace(rowH);
        const x = margin + col * colW;
        pdf.setFontSize(12);
        pdf.setTextColor(...C.title);
        const label = type === 'flashcards' ? `${p.a} × ${p.b}` : `${i + 1}.  ${p.a} × ${p.b} = `;
        pdf.text(label, x, y);
        if (showAnswers) {
          pdf.setTextColor(...C.green);
          const ax = x + pdf.getTextWidth(label) + 1;
          pdf.text(String(p.product), ax, y);
        }
        if (col === cols - 1) y += rowH;
      });
      if (currentProblems.length % cols !== 0) y += rowH;
    } else if (type === 'bingo') {
      // Render a 5x5 bingo grid.
      const products = new Set();
      selectedTables.forEach(t => { for (let f = 1; f <= 12; f++) products.add(t * f); });
      let pool = shuffle([...products]);
      while (pool.length < 24) pool = pool.concat(pool);
      const cells = pool.slice(0, 24);

      const gridSize = Math.min(pageWidth - margin * 2, 150);
      const cell = gridSize / 5;
      const startX = (pageWidth - gridSize) / 2;
      ensureSpace(gridSize + 20);

      pdf.setFontSize(20);
      pdf.setTextColor(...C.blue);
      pdf.text('B I N G O', pageWidth / 2, y, { align: 'center' });
      y += 6;

      let idx = 0;
      for (let r = 0; r < 5; r++) {
        for (let c = 0; c < 5; c++) {
          const cx = startX + c * cell;
          const cy = y + r * cell;
          pdf.setDrawColor(...C.light);
          pdf.setLineWidth(0.3);
          pdf.rect(cx, cy, cell, cell);
          if (r === 2 && c === 2) {
            pdf.setFontSize(9);
            pdf.setTextColor(...C.light);
            pdf.text('FREE', cx + cell / 2, cy + cell / 2 + 1, { align: 'center' });
          } else {
            pdf.setFontSize(14);
            pdf.setTextColor(...C.title);
            pdf.text(String(cells[idx++]), cx + cell / 2, cy + cell / 2 + 2, { align: 'center' });
          }
        }
      }
      y += gridSize + 10;

      if (showAnswers) {
        const facts = [];
        const seen = new Set();
        selectedTables.forEach(t => {
          for (let f = 1; f <= 12; f++) {
            const prod = t * f;
            if (cells.includes(prod) && !seen.has(t + 'x' + f)) { seen.add(t + 'x' + f); facts.push(`${t}×${f}=${prod}`); }
          }
        });
        ensureSpace(20);
        pdf.setFontSize(11);
        pdf.setTextColor(...C.title);
        pdf.text('Caller list:', margin, y); y += 6;
        pdf.setFontSize(9);
        pdf.setTextColor(...C.light);
        const lines = pdf.splitTextToSize(shuffle(facts).slice(0, 24).join('   ·   '), pageWidth - margin * 2);
        pdf.text(lines, margin, y);
      }
    } else if (type === 'matching') {
      const answers = showAnswers ? currentProblems : shuffle(currentProblems);
      const colW = (pageWidth - margin * 2) / 2;
      const rowH = 11;
      const startY = y;
      pdf.setFontSize(11);
      pdf.setTextColor(...C.light);
      pdf.text('PROBLEM', margin, y);
      pdf.text('ANSWER', margin + colW, y);
      y += 8;
      currentProblems.forEach((p, i) => {
        pdf.setFontSize(13);
        pdf.setTextColor(...C.title);
        pdf.text(`${p.a} × ${p.b}`, margin, y + i * rowH);
      });
      answers.forEach((p, i) => {
        pdf.setFontSize(13);
        pdf.setTextColor(showAnswers ? C.green : C.title);
        pdf.text(String(p.product), margin + colW, startY + 8 + i * rowH);
      });
    }

    const safeName = title.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '') || 'multiplication_game';
    pdf.save(`${safeName}.pdf`);
  } catch (err) {
    alert('Error generating PDF. Please try again. Error: ' + err.message);
    console.error('PDF Export Error:', err);
  }
}

// Initialize
initTables();
generate();
</script>

</body>
</html>
